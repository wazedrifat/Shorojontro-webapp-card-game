<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ষড়যন্ত্র - Shorojontro Card Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #0a0e27;
        color: #e0e0e0;
        overflow: hidden;
      }

      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Loading spinner */
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0e27;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.3s ease-out;
      }

      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(224, 224, 224, 0.2);
        border-top-color: #e0e0e0;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="loading">
      <div class="loading-spinner"></div>
      <p style="margin-top: 1rem">Loading Shorojontro...</p>
    </div>
    <script type="module">
      // Hide loading screen when game is ready
      console.log('[index.html] Setting up loading screen handler')
      window.addEventListener('load', () => {
        console.log('[index.html] Page loaded, checking game status...')
        setTimeout(() => {
          const loading = document.getElementById('loading')
          if (loading) {
            console.log('[index.html] Hiding loading screen')
            loading.classList.add('hidden')
          }
        }, 500)
      })

      // Also hide on first menu scene
      const originalCreate = Phaser.Scene.prototype.create
      Phaser.Scene.prototype.create = function() {
        if (this.scene.key === 'MenuScene') {
          console.log('[index.html] MenuScene detected, hiding loading')
          const loading = document.getElementById('loading')
          if (loading) {
            loading.classList.add('hidden')
          }
        }
        return originalCreate?.call(this)
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
